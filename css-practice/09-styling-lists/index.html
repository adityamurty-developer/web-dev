<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Styling</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .navbar ul{
            list-style: none;
            display: flex;
            gap: 150px;
            border: 1px solid black;
            box-shadow: 2px 5px 20px gray;
            padding: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li>Home</li>
            <li>Features</li>
            <li>content</li>
            <li>About</li>
        </ul>
    </div>
</body>
</html>
