<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries in CSS</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        body{
            background-color: gray;
        }

        @media only screen and (max-width: 768px) {
            body{
                background-color: teal;
            }
        }
        .container{
            display: flex;
        }
        .box{
            padding: 20px;
            margin: 30px;
            border: 2px solid black;
            background-color: darkcyan;
            width: 20vw;
            height: 10vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            hey i am a div
        </div>
        <div class="box">
            hey i am another div
        </div>
    </div>
</body>
</html>
