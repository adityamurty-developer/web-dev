<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 34px;
            font-style: normal;
            font-weight: 500;
            text-decoration: underline;
            letter-spacing: 6px;
            text-align: center;
        }
        h2{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 24px;
            font-weight: 400;
            text-transform: capitalize;
            text-decoration: underline;
            text-decoration-color: gold;
            text-decoration-thickness: 3px;
            text-indent: 10px;
            text-align: center;

        }
        p{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 18px;
            font-style: italic;
            font-weight: 350;
            line-height: 2;
            letter-spacing: 0.5px;
        }
        .lorem{
            border: 2px solid red;
            width: 45px;
            text-overflow: ellipsis;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div>
        <h1>Fonts</h1>
        <h2>about fonts</h2>
        <p>Hey i love writing Python codes.</p>
        <p>I want to become a Python developer, currently i am learning Django (a Python Framework) and then i will create some backend projects and api's.</p>
        <p class="lorem">I am also doing Data Structure and Algorithm in C++.</p>
    </div>
</body>
</html>
