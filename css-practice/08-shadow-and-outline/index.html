<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow and Outlines</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            color: blue;
            padding: 32px;
            border: 2px solid black;
            margin: 20px;
            box-shadow: 5px 10px 2px maroon;
            text-shadow: 2px 2px 2px yellow;
            outline: 4px solid yellow;
        }
    </style>
</head>
<body>
    <div class="box">
        This is a simple div container used to test box-shadow effects in CSS for learning and practice purposes.
    </div>
</body>
</html>
