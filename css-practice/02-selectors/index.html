<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Element Selector  */
        div{
            /* background-color: blueviolet; */
        }

        /* Class Selector */
        .violet{
            background-color: blueviolet;
        }

        /* Id Selector */
        #green{
            background-color: rgb(20, 141, 26);
        }

        /* Child Selector */
        div > p{
            color: orangered;
            background-color: darkgrey;
        }

        /* Descendant Selector */
        div p{
            color: orangered;
            background-color: darkgrey;
        }

        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }

        /* Pseudo Selector */
        a:visited{
            color: purple;
        }

        a:link{
            color: green
        }

        a:active{
            background-color: rgb(39, 34, 34);
        }

        a:hover{
            background-color: grey;
        }
    </style>
</head>
<body>
    <div class="violet">
        I am a div
        <span>
            <p>I am a paragraph inside div</p>
        </span>
    </div>

    <div id="green">
        I am another div
    </div>

    <div>
        <a href="https://www.google.com">Go to Google</a>
        <a href="https://www.instagram.com">Go to Instagram</a>
        <a href="https://www.facebook.com">Go to Facebook</a>
    </div>
</body>
</html>
