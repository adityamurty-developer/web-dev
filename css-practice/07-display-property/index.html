<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            font-size: 1rem;
            border: 3px solid blue;
            padding: 45px;
            margin: 34px;
            display: inline-block;
            width: 300px;
        }
        .box1{
            /* display: none; */
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div class="box box1">I am a box</div>
    <div class="box">I am another box</div>
    <span>I am a good</span>
    <span>boy</span>
</body>
</html>
