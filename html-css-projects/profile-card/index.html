<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>

    <link rel="stylesheet" href="style.css">

    <!-- Boxicons CSS -->
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'/>
</head>
<body>
    <div class="profile-card">

        <div class="img">
            <img src="profile-img.png" alt="" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">RohanDev</span>
            <span class="job">Python Developer</span>
        </div>

        <div class="media-buttons">
            <a href="#" style="background: #FF0033" class="link">
                <i class='bx bxl-youtube'></i>
            </a>
            

            <a href="#" style="background: #ee2881" class="link">
                <i class='bx bxl-instagram' ></i>
            </a>
            

            <a href="#" style="background: #70757a" class="link">
                <i class='bx bxl-github' ></i>
            </a>
            
            <a href="#" style="background: #0e62c3" class="link">
                <i class='bx bxl-linkedin' ></i>
            </a>

        </div>

        <div class="buttons">
                <button class="button">Subscribe</button>
                <button class="button">Contact</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class='bx bx-like' ></i>
                <span class="number">40k</span>
            </div>
            <div class="data">
                <i class='bx bx-comment' ></i>
                <span class="number">40k</span>
            </div>
            <div class="data">
                <i class='bx bx-share' ></i>
                <span class="number">40k</span>
            </div>
        </div>

    </div>
</body>
</html>
