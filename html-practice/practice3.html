<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
    <form>
    <h1 style="text-align: center;">Contact Form</h1>
    <div>
        <label for="name">Enter your name</label><br>
        <input type="text" id="name" name="username">

        <label for="email">Enter your email id</label><br>
        <input type="email" id="email" name="mail-id">

        <label for="message">Enter your message</label><br>
        <textarea id="message" name="message"></textarea>

        <label for="select">Select Your State</label><br>
        <select name="select" id="select">
            <option value="1">MP</option>
            <option value="2">MH</option>
            <option value="3">AP</option>
            <option value="4">UP</option>
        </select>

        <input type="checkbox" id="terms" name="terms">
        <label for="terms">Accept Terms and Conditions for the above Form.</label>

        <button>Submit</button>
    </div>
    </form>
</body>
</html>
